<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #e0f0ff, #f7f9fc);
            color: #333;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #0d3b66;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2.2em; 
            font-weight: bold;
            color: #0d3b66;
        }

        .menu {
            display: flex;
            gap: 30px;
        }

        .menu a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.2em; 
            transition: color 0.3s;
        }

        .menu a:hover {
            color: #ffcc00;
        }

        section {
            max-width: 800px;
            margin: 60px auto;
            padding: 50px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        section h2 {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #0d3b66;
            border-bottom: 3px solid #0d3b66;
            display: inline-block;
            padding-bottom: 8px;
        }

        .contact-info p {
            font-size: 1.9em; 
            margin: 12px 0;
            color: #444;
        }

        .contact-buttons {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .contact-buttons a {
            text-decoration: none;
            padding: 15px 30px; 
            border-radius: 8px;
            font-size: 1.2em; 
            font-weight: 600;
            transition: 0.3s;
            color: #fff;
        }

        .contact-buttons a.contact-email {
            background-color: #0d3b66;
        }

        .contact-buttons a.contact-email:hover {
            background-color: #ffcc00;
            color: #0d3b66;
        }

        .contact-buttons a.download-resume {
            background-color: #1a73e8;
        }

        .contact-buttons a.download-resume:hover {
            background-color: #ffcc00;
            color: #0d3b66;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 15px;
            }

            .menu {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
    <title>Contact</title>
</head>
<body>

<header>
    <a href="contact.html" class="logo">CONTACT</a>
    <nav>
        <a href="index.html">HOME</a>
        <a href="education.html">EDUCATION</a>
        <a href="skills.html">SKILLS</a>
        <a href="experience.html">EXPERIENCE</a>
        <a href="contact.html" class="active">CONTACT</a>
    </nav>
</header>

    <section id="contact">
        <h2>Contact Me</h2>

        <div class="contact-info">
            <p>Email: bhuvaneshwarmithra@gmail.com</p>
            <p>Phone: +91 88705 95693</p>
            <p>Location: Tamil nadu, India</p>
        </div>

        <div class="contact-buttons">
            <a class="contact-email" href="mailto:praveen@example.com">Send Email</a>
        </div>
    </section>
</body>
</html>
