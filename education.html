<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f8; /* light professional background */
            color: #333;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background-color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            font-size: 1.8em;
            font-weight: bold;
            color: #f10000;
            text-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-decoration: none;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            margin-left: 30px;
            padding-bottom: 5px;
            transition: all 0.3s;
        }

        nav a.active,
        nav a:hover {
            color: #f10000;
            border-bottom: 2px solid #f10000;
        }

        /* Education Section */
        .education {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .education-title {
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 40px;
            color: #f10000;
            text-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        .education-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .education-card {
            background-color: #ffffff;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .education-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .education-card h2 {
            font-size: 1.5em;
            margin: 0 0 10px;
            color: #4A148C;
        }

        .education-card h2 a {
            text-decoration: none;
            color: inherit;
            transition: color 0.3s;
        }

        .education-card h2 a:hover {
            color: #f10000;
        }

        .education-card p {
            font-size: 1.1em;
            color: #555;
            margin: 5px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 10px;
            }

            nav a {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="education.html" class="logo">EDUCATIONAL DETAILS</a>
        <nav>
            <a href="index.html">HOME</a>
            <a href="education.html" class="active">EDUCATION</a>
            <a href="skills.html">SKILLS</a>
            <a href="experience.html">EXPERIENCE</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>

    <section class="education">
        <h1 class="education-title">My Education</h1>

        <div class="education-container">
            <div class="education-card">
                <h2><a href="https://pudukkottai.nic.in/school-education/" target="_blank">
                    GOVN. MODEL HIGHER SECONDARY SCHOOL
                </a></h2>
                <p>HSC</p>
            </div>

            <div class="education-card">
                <h2><a href="https://asc.srmtrichy.edu.in/" target="_blank">
                    SRM TRICHY ARTS AND SCIENCE
                </a></h2>
                <p>Bachelor of Science(B.SC)</p>
                <p>Computer Science </p>
                <p>2024 - 2028</p>
            </div>
        </div>
    </section>
</body>
</html>
