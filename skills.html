<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>

    <style>

        /* Professional Dark Blue Background */
        body {
            margin: 0;
            padding: 0;
            font-family: Poppins, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
            background-size: cover;
            color: white;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            z-index: 100;
            box-sizing: border-box;
        }

        header a.logo {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
        }

        nav a {
            margin-left: 20px;
            font-size: 18px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a.active,
        nav a:hover {
            color: #93c5fd;
        }

        /* Skills Section */
        .skills-section {
            margin-top: 150px;
            padding: 20px 100px;
        }

        .section-title {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 50px;
            text-align: center;
            color: #ffffff;
        }

        .skill-box {
            margin-bottom: 35px;
        }

        .skill-box p {
            font-size: 22px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .skill-icon {
            width: 35px;
            height: 35px;
            margin-right: 10px;
            vertical-align: middle;
        }

        .skills-bar {
            width: 100%;
            height: 14px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            overflow: hidden;
        }

        .skills-level {
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #60a5fa);
            border-radius: 20px;
            width: 0;
            animation: fill 2s forwards;
        }

        @keyframes fill {
            from {
                width: 0;
            }
            to {
                width: var(--target-width);
            }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {

            header {
                padding: 12px 20px;
                flex-direction: column;
                text-align: center;
            }

            nav {
                margin-top: 10px;
            }

            nav a {
                margin: 8px;
            }

            .skills-section {
                padding: 20px;
                margin-top: 180px;
            }

            .section-title {
                font-size: 32px;
            }

            .skill-box p {
                font-size: 18px;
            }
        }

    </style>
</head>

<body>

<header>
    <a href="skills.html" class="logo">SKILLS</a>

    <nav>
        <a href="index.html">HOME</a>
        <a href="education.html">EDUCATION</a>
        <a href="skills.html" class="active">SKILLS</a>
        <a href="experience.html">EXPERIENCE</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</header>

<section class="skills-section">

    <h2 class="section-title">My Skills</h2>

    <div class="skill-box">
        <p>
            <span><img class="skill-icon" src="images/HTML5_logo_and_wordmark.svg.png"> HTML</span>
            <span>91%</span>
        </p>
        <div class="skills-bar">
            <div class="skills-level" style="--target-width:91%;"></div>
        </div>
    </div>

    <div class="skill-box">
        <p>
            <span><img class="skill-icon" src="images/CSS.webp"> CSS</span>
            <span>80%</span>
        </p>
        <div class="skills-bar">
            <div class="skills-level" style="--target-width:80%;"></div>
        </div>
    </div>

    <div class="skill-box">
        <p>
            <span><img class="skill-icon" src="images/js.png"> JavaScript</span>
            <span>75%</span>
        </p>
        <div class="skills-bar">
            <div class="skills-level" style="--target-width:75%;"></div>
        </div>
    </div>

    <div class="skill-box">
        <p>
            <span><img class="skill-icon" src="images/react.png"> React</span>
            <span>60%</span>
        </p>
        <div class="skills-bar">
            <div class="skills-level" style="--target-width:60%;"></div>
        </div>
    </div>

    <div class="skill-box">
        <p>
            <span><img class="skill-icon" src="images/java.png"> Java</span>
            <span>70%</span>
        </p>
        <div class="skills-bar">
            <div class="skills-level" style="--target-width:70%;"></div>
        </div>
    </div>

    <div class="skill-box">
        <p>
            <span><img class="skill-icon" src="images/python.png"> Python</span>
            <span>65%</span>
        </p>
        <div class="skills-bar">
            <div class="skills-level" style="--target-width:65%;"></div>
        </div>
    </div>

</section>

</body>
</html>
